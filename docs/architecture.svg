<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bgAG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0f1c"/><stop offset="1" stop-color="#0f2027"/>
    </linearGradient>
    <linearGradient id="inAG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#60a5fa"/><stop offset="1" stop-color="#1d4ed8"/></linearGradient>
    <linearGradient id="coreAG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5eead4"/><stop offset="1" stop-color="#0f766e"/></linearGradient>
    <linearGradient id="detAG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fda4af"/><stop offset="1" stop-color="#9f1239"/></linearGradient>
    <linearGradient id="outAG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fcd34d"/><stop offset="1" stop-color="#b45309"/></linearGradient>
    <linearGradient id="delAG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#c084fc"/><stop offset="1" stop-color="#6b21a8"/></linearGradient>
    <filter id="shAG"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.45"/></filter>
    <marker id="arrAG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1100" height="640" fill="url(#bgAG)"/>
  <text x="550" y="40" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700">ArchGuard — Architecture Drift Detector</text>
  <text x="550" y="62" text-anchor="middle" fill="#64748b" font-size="13">Static analysis · 6 detectors · CLI · Git hooks · GitHub Action</text>

  <!-- Input -->
  <g filter="url(#shAG)">
    <rect x="30" y="100" width="180" height="440" rx="18" fill="#0b1424" stroke="#60a5fa" stroke-opacity="0.45"/>
    <text x="120" y="128" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">INPUT</text>
    <g transform="translate(50,160)"><rect width="140" height="60" rx="12" fill="url(#inAG)"/><text x="70" y="36" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">CLI Commands</text></g>
    <g transform="translate(50,240)"><rect width="140" height="60" rx="12" fill="url(#inAG)"/><text x="70" y="36" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">YAML Config</text></g>
    <g transform="translate(50,320)"><rect width="140" height="60" rx="12" fill="url(#inAG)"/><text x="70" y="36" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Git Integration</text></g>
  </g>

  <!-- Core -->
  <g filter="url(#shAG)">
    <rect x="240" y="100" width="220" height="440" rx="18" fill="#0b1424" stroke="#5eead4" stroke-opacity="0.5"/>
    <text x="350" y="128" text-anchor="middle" fill="#99f6e4" font-size="13" font-weight="700">CORE ENGINE</text>
    <g transform="translate(260,160)"><rect width="180" height="60" rx="12" fill="url(#coreAG)"/><text x="90" y="36" text-anchor="middle" fill="#022c22" font-size="13" font-weight="700">AST Parser</text></g>
    <g transform="translate(260,240)"><rect width="180" height="60" rx="12" fill="url(#coreAG)"/><text x="90" y="36" text-anchor="middle" fill="#022c22" font-size="13" font-weight="700">Dependency Graph</text></g>
    <g transform="translate(260,320)"><rect width="180" height="60" rx="12" fill="url(#coreAG)"/><text x="90" y="36" text-anchor="middle" fill="#022c22" font-size="13" font-weight="700">Base Analyzer</text></g>
  </g>

  <!-- Detectors -->
  <g filter="url(#shAG)">
    <rect x="490" y="100" width="320" height="440" rx="18" fill="#0b1424" stroke="#fda4af" stroke-opacity="0.5"/>
    <text x="650" y="128" text-anchor="middle" fill="#fecdd3" font-size="13" font-weight="700">DETECTORS</text>
    <g transform="translate(510,150)"><rect width="135" height="50" rx="10" fill="url(#detAG)"/><text x="67" y="30" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Circular Dep</text></g>
    <g transform="translate(655,150)"><rect width="135" height="50" rx="10" fill="url(#detAG)"/><text x="67" y="30" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">God Class</text></g>
    <g transform="translate(510,215)"><rect width="135" height="50" rx="10" fill="url(#detAG)"/><text x="67" y="30" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Layer Bypass</text></g>
    <g transform="translate(655,215)"><rect width="135" height="50" rx="10" fill="url(#detAG)"/><text x="67" y="30" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Magic Value</text></g>
    <g transform="translate(510,280)"><rect width="135" height="50" rx="10" fill="url(#detAG)"/><text x="67" y="30" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Complexity</text></g>
    <g transform="translate(655,280)"><rect width="135" height="50" rx="10" fill="url(#detAG)"/><text x="67" y="30" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Layer Violation</text></g>
    <g transform="translate(510,360)"><rect width="280" height="80" rx="10" fill="#1e293b" stroke="#fb7185"/>
      <text x="140" y="32" text-anchor="middle" fill="#fda4af" font-size="12" font-weight="700">Severity Grading</text>
      <rect x="20" y="48" width="60" height="20" rx="4" fill="#dc2626"/><text x="50" y="62" text-anchor="middle" fill="#fff" font-size="10">critical</text>
      <rect x="90" y="48" width="60" height="20" rx="4" fill="#ea580c"/><text x="120" y="62" text-anchor="middle" fill="#fff" font-size="10">high</text>
      <rect x="160" y="48" width="60" height="20" rx="4" fill="#ca8a04"/><text x="190" y="62" text-anchor="middle" fill="#fff" font-size="10">medium</text>
      <rect x="20" y="48" width="60" height="20" rx="4" fill="#dc2626"/>
    </g>
  </g>

  <!-- Output -->
  <g filter="url(#shAG)">
    <rect x="840" y="100" width="230" height="200" rx="18" fill="#0b1424" stroke="#fcd34d" stroke-opacity="0.5"/>
    <text x="955" y="128" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="700">FORMATTERS</text>
    <g transform="translate(860,150)"><rect width="90" height="46" rx="8" fill="url(#outAG)"/><text x="45" y="29" text-anchor="middle" fill="#1f1303" font-size="12" font-weight="700">Table</text></g>
    <g transform="translate(960,150)"><rect width="90" height="46" rx="8" fill="url(#outAG)"/><text x="45" y="29" text-anchor="middle" fill="#1f1303" font-size="12" font-weight="700">JSON</text></g>
    <g transform="translate(860,206)"><rect width="90" height="46" rx="8" fill="url(#outAG)"/><text x="45" y="29" text-anchor="middle" fill="#1f1303" font-size="12" font-weight="700">Markdown</text></g>
    <g transform="translate(960,206)"><rect width="90" height="46" rx="8" fill="url(#outAG)"/><text x="45" y="29" text-anchor="middle" fill="#1f1303" font-size="12" font-weight="700">HTML</text></g>
  </g>

  <!-- Delivery -->
  <g filter="url(#shAG)">
    <rect x="840" y="320" width="230" height="220" rx="18" fill="#0b1424" stroke="#c084fc" stroke-opacity="0.5"/>
    <text x="955" y="348" text-anchor="middle" fill="#e9d5ff" font-size="13" font-weight="700">DELIVERY</text>
    <g transform="translate(860,370)"><rect width="190" height="46" rx="10" fill="url(#delAG)"/><text x="95" y="29" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">CLI Output</text></g>
    <g transform="translate(860,426)"><rect width="190" height="46" rx="10" fill="url(#delAG)"/><text x="95" y="29" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Git Pre-commit / Push</text></g>
    <g transform="translate(860,482)"><rect width="190" height="46" rx="10" fill="url(#delAG)"/><text x="95" y="29" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">GitHub Action</text></g>
  </g>

  <g stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrAG)">
    <path d="M210,190 C225,190 225,190 240,190"/>
    <path d="M210,270 C225,270 225,270 240,270"/>
    <path d="M210,350 C225,350 225,350 240,350"/>
    <path d="M460,350 C475,350 475,250 490,250"/>
    <path d="M810,200 C825,200 825,200 840,200"/>
    <path d="M810,400 C825,400 825,400 840,400"/>
  </g>
  <text x="550" y="600" text-anchor="middle" fill="#64748b" font-size="12">Config + git tree → AST + dependency graph → 6 detectors → formatted report → CLI / hook / CI</text>
</svg>
