# Ruff configuration for ArchGuard
# https://docs.astral.sh/ruff/

target-version = "py310"
line-length = 100

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # Pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
    "ARG",  # flake8-unused-arguments
    "PTH",  # flake8-use-pathlib
    "ERA",  # eradicate
    "PL",   # Pylint
]

ignore = [
    "E501",  # Line too long (handled by formatter)
    "PLR0913",  # Too many arguments
    "PLR0915",  # Too many statements
    "PLR2004",  # Magic value (we have our own detector)
    "W293",  # Blank line contains whitespace
    "PLC0415",  # Allow local imports where practical
    "SIM102",  # Nested if simplification is optional
    "SIM108",  # Ternary preference is optional
    "SIM118",  # dict.keys explicitness is acceptable
    "PTH109",  # Path.cwd conversion is optional
    "PLW0108",  # lambda simplification is optional
    "PTH123",  # built-in open usage is acceptable
    "SIM101",  # combined isinstance preference is optional
    "SIM103",  # direct return style is optional
    "SIM110",  # any() style preference is optional
    "ERA001",  # commented code detection too aggressive for comments
]

[lint.pydocstyle]
convention = "google"

[lint.per-file-ignores]
# Tests can have more flexibility
"tests/**/*" = [
    "S101",  # assert allowed in tests
    "ARG001",  # unused arguments in test fixtures
    "PLR2004",  # magic values in tests
    "PLW1510",  # subprocess without check in CLI integration tests
    "ARG002",  # unused args in local test analyzers
]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
